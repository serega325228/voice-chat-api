env: "docker"
http_server:
    address: ":8082"
    shutdown_timeout: "15s"
    close_timeout: "10s"
    timeout: "4s"
    idle_timeout: "60s"
grpc:
    address: "sfu:8081"
    keepalive:
        time: "20s"
        timeout: "10s"
        permit_without_stream: true
signaling:
    enqueue_timeout: "200ms"
    reconnect_min_delay: "250ms"
    reconnect_max_delay: "5s"
    reconnect_token_ttl: "5m"
    leave_timeout: "5s"
    control_write_timeout: "1s"
    websocket_pong_wait: "60s"
    websocket_ping_period: "50s"
    websocket_write_timeout: "5s"
    websocket_read_limit: 1048576
    websocket_send_buffer_size: 128
jwt:
    access_ttl: "15m"
    refresh_ttl: "720h"
postgres:
    max_conns: 15
    health_check_period: "60s"
